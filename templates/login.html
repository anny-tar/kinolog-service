{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-shield-fill text-dark" style="font-size: 3rem;"></i>
                    <h4 class="mt-2 fw-bold">Кинологическая служба</h4>
                    <p class="text-muted small">ГУ МВД России по Самарской области</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Логин</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-triangle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-dark w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
